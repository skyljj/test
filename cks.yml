- name: Get VolumeAttachments from OpenShift
  delegate_to: localhost
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: VolumeAttachment
    # 如果你的 kubeconfig 不在默认路径，请取消注释并修改下方路径
    # kubeconfig: "{{ ansible_env.HOME }}/.kube/config"
  register: va_results

- name: Debug VolumeAttachments status
  ansible.builtin.debug:
    msg: >-
      {% if va_results.resources | length > 0 %}
      {% for va in va_results.resources %}
      VolumeAttachment: {{ va.metadata.name }}
      Node: {{ va.spec.nodeName }}
      Volume: {{ va.spec.source.persistentVolumeName | default('N/A') }}
      Status (Attached): {{ va.status.attached }}
      -----------------------------------------
      {% endfor %}
      {% else %}
      No VolumeAttachments found.
      {% endif %}
      
- name: Debug VolumeAttachments status
  ansible.builtin.debug:
    msg: >-
      {% set attached_vas = va_results.resources | selectattr('status.attached', 'defined') | selectattr('status.attached', 'equalto', true) | list %}
      {% if attached_vas | length > 0 %}
      Found {{ attached_vas | length }} active VolumeAttachments (Status: Attached=true):
      ====================================================================
      {% for va in attached_vas %}
      VolumeAttachment: {{ va.metadata.name }}
      Node: {{ va.spec.nodeName }}
      Volume: {{ va.spec.source.persistentVolumeName | default('N/A') }}
      Status (Attached): {{ va.status.attached }}
      {% if va.metadata.deletionTimestamp is defined %}
      Warning: Deletion in progress (deletionTimestamp is set but block device is still locked).
      {% endif %}
      --------------------------------------------------------------------
      {% endfor %}
      {% else %}
      No active VolumeAttachments (Attached=true) found in the cluster.
      {% endif %}

- name: Get all Pods from Cluster
      kubernetes.core.k8s_info:
        kind: Pod
      register: pod_results

    - name: Debug Remaining Pods on Worker Nodes
      ansible.builtin.debug:
        msg: >-
          {% set worker_pods = [] %}
          {% for pod in pod_results.resources %}
            {# 直接判断节点名称中是否包含 'worker' 关键字 #}
            {% if pod.spec.nodeName is defined and 'worker' in pod.spec.nodeName %}
              {% set _ = worker_pods.append(pod) %}
            {% endif %}
          {% endfor %}
          
          {% if worker_pods | length > 0 %}
          [INFO] Found {{ worker_pods | length }} Pods still technically "running" on the shutdown Worker nodes:
          ====================================================================
          {% for pod in worker_pods %}
          Namespace: {{ pod.metadata.namespace }}
          Pod Name: {{ pod.metadata.name }}
          Node (Shutdown): {{ pod.spec.nodeName }}
          Status in etcd: {{ pod.status.phase }}
          {% if pod.metadata.deletionTimestamp is defined %}
          Mark: Terminating (Stuck because Kubelet is offline)
          {% else %}
          Mark: Active (Master thinks it's perfectly fine!)
          {% endif %}
          --------------------------------------------------------------------
          {% endfor %}
          {% else %}
          [OK] Clean! No Pods are left on any Worker nodes.
          {% endif %}
