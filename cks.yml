- name: Get VolumeAttachments from OpenShift
  delegate_to: localhost
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: VolumeAttachment
    # 如果你的 kubeconfig 不在默认路径，请取消注释并修改下方路径
    # kubeconfig: "{{ ansible_env.HOME }}/.kube/config"
  register: va_results

- name: Debug VolumeAttachments status
  ansible.builtin.debug:
    msg: >-
      {% if va_results.resources | length > 0 %}
      {% for va in va_results.resources %}
      VolumeAttachment: {{ va.metadata.name }}
      Node: {{ va.spec.nodeName }}
      Volume: {{ va.spec.source.persistentVolumeName | default('N/A') }}
      Status (Attached): {{ va.status.attached }}
      -----------------------------------------
      {% endfor %}
      {% else %}
      No VolumeAttachments found.
      {% endif %}
      
- name: Debug VolumeAttachments status
  ansible.builtin.debug:
    msg: >-
      {% set attached_vas = va_results.resources | selectattr('status.attached', 'defined') | selectattr('status.attached', 'equalto', true) | list %}
      {% if attached_vas | length > 0 %}
      Found {{ attached_vas | length }} active VolumeAttachments (Status: Attached=true):
      ====================================================================
      {% for va in attached_vas %}
      VolumeAttachment: {{ va.metadata.name }}
      Node: {{ va.spec.nodeName }}
      Volume: {{ va.spec.source.persistentVolumeName | default('N/A') }}
      Status (Attached): {{ va.status.attached }}
      {% if va.metadata.deletionTimestamp is defined %}
      Warning: Deletion in progress (deletionTimestamp is set but block device is still locked).
      {% endif %}
      --------------------------------------------------------------------
      {% endfor %}
      {% else %}
      No active VolumeAttachments (Attached=true) found in the cluster.
      {% endif %}

- name: Get all Pods from Cluster
      kubernetes.core.k8s_info:
        kind: Pod
      register: pod_results

    - name: Debug Remaining Pods on Worker Nodes
      ansible.builtin.debug:
        msg: >-
          {% set worker_pods = [] %}
          {% for pod in pod_results.resources %}
            {# 直接判断节点名称中是否包含 'worker' 关键字 #}
            {% if pod.spec.nodeName is defined and 'worker' in pod.spec.nodeName %}
              {% set _ = worker_pods.append(pod) %}
            {% endif %}
          {% endfor %}
          
          {% if worker_pods | length > 0 %}
          [INFO] Found {{ worker_pods | length }} Pods still technically "running" on the shutdown Worker nodes:
          ====================================================================
          {% for pod in worker_pods %}
          Namespace: {{ pod.metadata.namespace }}
          Pod Name: {{ pod.metadata.name }}
          Node (Shutdown): {{ pod.spec.nodeName }}
          Status in etcd: {{ pod.status.phase }}
          {% if pod.metadata.deletionTimestamp is defined %}
          Mark: Terminating (Stuck because Kubelet is offline)
          {% else %}
          Mark: Active (Master thinks it's perfectly fine!)
          {% endif %}
          --------------------------------------------------------------------
          {% endfor %}



- name: Debug Remaining Pods on Worker Nodes (Excluding DaemonSets)
      ansible.builtin.debug:
        msg: >-
          {% set worker_non_ds_pods = [] %}
          {% for pod in pod_results.resources %}
            {# 1. Check if the pod is scheduled on a worker node #}
            {% if pod.spec.nodeName is defined and 'worker' in pod.spec.nodeName %}
              
              {# 2. Check if the pod is managed by a DaemonSet #}
              {% set is_daemonset = false %}
              {% if pod.metadata.ownerReferences is defined %}
                {% for owner in pod.metadata.ownerReferences %}
                  {% if owner.kind == 'DaemonSet' %}
                    {% set is_daemonset = true %}
                  {% endif %}
                {% endfor %}
              {% endif %}
              
              {# 3. If it is a worker pod and NOT a DaemonSet, collect it #}
              {% if not is_daemonset %}
                {% set _ = worker_non_ds_pods.append(pod) %}
              {% endif %}

            {% endif %}
          {% endfor %}
          
          {% if worker_non_ds_pods | length > 0 %}
          [INFO] Found {{ worker_non_ds_pods | length }} regular Pods (Excluding DaemonSets) still stuck on shutdown Workers:
          ====================================================================
          {% for pod in worker_non_ds_pods %}
          Namespace: {{ pod.metadata.namespace }}
          Pod Name: {{ pod.metadata.name }}
          Node (Shutdown): {{ pod.spec.nodeName }}
          Status in etcd: {{ pod.status.phase }}
          {% if pod.metadata.deletionTimestamp is defined %}
          Mark: Terminating (Stuck because Kubelet is offline)
          {% else %}
          Mark: Active (Master still thinks it's running!)
          {% endif %}
          --------------------------------------------------------------------
          {% endfor %}
          {% else %}
          [OK] Clean! No regular business Pods left on any Worker nodes (All clear for storage detachment check).
          {% endif %}
          {% else %}
          [OK] Clean! No Pods are left on any Worker nodes.
          {% endif %}



---
- name: Force Drain Worker Nodes and Verify Status
  hosts: localhost
  gather_facts: false

  tasks:
    # ==================== STEP 1: GET CURRENT WORKER NODES ====================
    - name: Fetch all node information from the cluster
      kubernetes.core.k8s_info:
        kind: Node
      register: node_results

    # ==================== STEP 2: FORCE DRAIN WORKERS ====================
    - name: Force drain worker nodes
      kubernetes.core.k8s_drain:
        name: "{{ item.metadata.name }}"
        state: drain
        # force: true ignores pods not managed by a replication controller/replicaSet/DaemonSet
        force: true
        # ignore_daemonsets: true allows evicting business pods while leaving node-infra pods intact
        ignore_daemonsets: true
        delete_options:
          # grace_period: 0 forces immediate eviction to accelerate maintenance windows
          grace_period: 0
          # Setting ignore_w_no_controller to true prevents being blocked by naked pods
          ignore_w_no_controller: true
      loop: "{{ node_results.resources }}"
      # Dynamically targets only your worker nodes
      when: "'worker' in item.metadata.name"

    # ==================== STEP 3: VERIFY DRAINED STATUS ====================
    - name: Fetch node status post-drain for validation
      kubernetes.core.k8s_info:
        kind: Node
      register: post_drain_node_results

    - name: Debug and verify worker node status
      ansible.builtin.debug:
        msg: >-
          {% set worker_nodes = [] %}
          {% for node in post_drain_node_results.resources %}
            {% if 'worker' in node.metadata.name %}
              {% set _ = worker_nodes.append(node) %}
            {% endif %}
          {% endfor %}

          Verification Results for Worker Nodes:
          ====================================================================
          {% for node in worker_nodes %}
          Node Name: {{ node.metadata.name }}
          Unschedulable (Cordoned): {{ node.spec.unschedulable | default(false) }}
          Status: {% if node.spec.unschedulable | default(false) == true %}✅ [READY] Node is cordoned/SchedulingDisabled.{% else %}❌ [FAILED] Node is still active!{% endif %}
          --------------------------------------------------------------------
          {% endfor %}
