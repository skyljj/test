- name: Print Tower execution context
  debug:
    msg:
      - "Tower user name: {{ tower_user_name | default('unknown') }}"
      - "Tower user id: {{ tower_user_id | default('unknown') }}"
      - "Job id: {{ tower_job_id | default('unknown') }}"
      - "Job template id: {{ tower_job_template_id | default('unknown') }}"


- name: Configure chrony
  k8s:
    state: present
    definition:
      apiVersion: config.openshift.io/v1
      kind: ChronyConfig
      metadata:
        name: cluster
      spec:
        servers:
          - {{ my_chrony_server }}


- name: Normalize ESXi services to dict
  set_fact:
    esxi_services: >-
      {{
        dict(
          host_services.host_service_info[inventory_hostname]
          | map(attribute='key')
          | zip(host_services.host_service_info[inventory_hostname])
        )
      }}


- name: Service policy compliance check
  set_fact:
    Compliant: false
  loop: "{{ service | dict2items }}"
  when:
    - item.key not in esxi_services
      or
      esxi_services[item.key].policy != item.value.policy
      or
      esxi_services[item.key].running != item.value.running

- name: Collect non-compliant services
  set_fact:
    non_compliant_services: "{{ non_compliant_services | default([]) + [ item.key ] }}"
  loop: "{{ service | dict2items }}"
  when:
    - item.key not in esxi_services
      or
      esxi_services[item.key].policy != item.value.policy
      or
      esxi_services[item.key].running != item.value.running



- name: Print NIC details
  debug:
    msg:
      label: "{{ vm_info.instance['hw_' ~ item].label }}"
      mac: "{{ vm_info.instance['hw_' ~ item].macaddress }}"
      portgroup: "{{ vm_info.instance['hw_' ~ item].portgroup_key }}"
  loop: "{{ vm_info.instance.hw_interfaces }}"

- name: Collect NIC definitions
  set_fact:
    nic_definitions: >-
      {{
        nic_definitions | default([]) + [
          {
            'label': vm_info.instance['hw_' ~ item].label,
            'mac': vm_info.instance['hw_' ~ item].macaddress,
            'portgroup': vm_info.instance['hw_' ~ item].portgroup_key
          }
        ]
      }}
  loop: "{{ vm_info.instance.hw_interfaces }}"

- name: Fail if Network adapter 1 already exists
  fail:
    msg: "Unexpected Network adapter 1 found before PXE reprovision"
  when: >
    nic_definitions
    | selectattr('label', 'equalto', 'Network adapter 1')
    | list
    | length > 0
    


- name: Re-add original NICs with same MAC
  community.vmware.vmware_guest_network:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: false
    datacenter: "{{ datacenter }}"
    name: "{{ vm_name }}"
    state: present
    network_name: "{{ item.network }}"
    mac_address: "{{ item.mac }}"
    device_type: "{{ item.type }}"
    connected: "{{ item.connected | default(true) }}"
    start_connected: "{{ item.start_connected | default(true) }}"
  loop: "{{ nic_definitions }}"


- name: Restore normal boot order
  vmware_guest:
    ...
    boot_order:
      - disk
      - network

---
# add_pxe_adapter.yml - Add new network adapter with PXE VLAN
# Adds a new network adapter to the VM and assigns it to the PXE VLAN
# Network adapter 1 is typically empty (previously used for PXE then deleted)
# Network adapter 2 is the data network adapter

- name: Get VM network adapter info to find dvswitch
  community.vmware.vmware_guest_network:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: "{{ validate_certs | default(false) }}"
    name: "{{ vm_name }}"
    gather_network_info: true
  delegate_to: localhost
  register: vm_network_info

- name: Extract dvswitch name from existing adapter
  set_fact:
    vm_dvswitch_name: "{{ vm_network_info.network_info | map(attribute='switch') | select('defined') | first }}"

- name: Log dvswitch name
  debug:
    msg: "VM '{{ vm_name }}' is connected to dvswitch: {{ vm_dvswitch_name }}"

- name: Get all portgroups on the dvswitch
  community.vmware.vmware_dvs_portgroup_find:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: "{{ validate_certs | default(false) }}"
    dvswitch: "{{ vm_dvswitch_name }}"
    vlanid: 199
  delegate_to: localhost
  register: pxe_portgroup_result

- name: Fail if no portgroup with VLAN 199 found
  fail:
    msg: "No portgroup with VLAN ID 199 found on dvswitch '{{ vm_dvswitch_name }}'"
  when: pxe_portgroup_result.dvs_portgroups | length == 0

- name: Set PXE VLAN name from dvswitch portgroup
  set_fact:
    pxe_vlan_name: "{{ pxe_portgroup_result.dvs_portgroups[0].name }}"


- name: Log PXE VLAN name
  debug:
    msg: "Found PXE VLAN portgroup: {{ pxe_vlan_name }} (VLAN 199) on dvswitch {{ vm_dvswitch_name }}"


- name: Backup cert file on VM to backup directory
  ansible.builtin.shell: |
    set -e
    install -d -m 0755 "{{ vm_reimage_cert_backup_dir }}"
    test -f "{{ vm_reimage_cert_src }}"
    cp -a "{{ vm_reimage_cert_src }}" "{{ vm_reimage_cert_backup_dir }}/"
  delegate_to: "vm_reimage_ssh_{{ vm_name }}"
  become: "{{ vm_reimage_ssh_become | default(true) }}"
  
    - name: Restore cert to /var/lib and restart node exporter
  ansible.builtin.shell: |
    set -e
    backup_file="{{ vm_reimage_cert_backup_dir }}/{{ vm_reimage_cert_src | basename }}"
    test -f "$backup_file"
    mv "$backup_file" "{{ vm_reimage_cert_src }}"
    systemctl restart "{{ vm_reimage_node_exporter_service }}"
  delegate_to: "vm_reimage_ssh_restore_{{ vm_name }}"
  become: "{{ vm_reimage_ssh_become | default(true) }}"
  when: vm_ssh_host_restore | length > 0
